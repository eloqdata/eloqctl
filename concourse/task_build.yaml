platform: linux
image_resource:
  type: registry-image
inputs:
  - name: monograph_waiter
outputs:
  - name: the-output
run:
  path: /bin/bash
  args:
    - -cxe
    - |
      WORK_DIR=$(pwd)
      cd monograph_waiter
      cargo make --no-workspace --makefile Makefile.toml rest_api_pkg
      tar -czvf eloqctl.tar.gz eloqctl
      mv eloqctl.tar.gz ${WORK_DIR}/the-output/
