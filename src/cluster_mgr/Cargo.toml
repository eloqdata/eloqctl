[package]
name = "cluster_mgr"
version = "0.1.0"
edition = "2021"
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
crossbeam-channel = "0.5"
futures = { version = "0.3", default-features = false, features = ["alloc", "thread-pool"] }
futures-async-stream = "0.2"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["alloc", "ansi", "env-filter", "fmt", "matchers", "once_cell", "parking_lot", "regex", "registry", "sharded-slab", "smallvec", "std", "thread_local", "time", "tracing", "tracing-log"] }
sqlx = { version = "0.6", features = ["sqlite", "runtime-tokio-native-tls", "macros", "chrono"] }
chrono = "0.4"
reqwest = { version = "0.11", features = ["json", "stream"] }
dirs = "4"
strum_macros = "0.24"
ssh2 = "0.9"
bytes = "1"
itertools = "0.10.5"
configparser = { version = "3.0.2", features = ["indexmap"] }
indicatif = "0.17"
thiserror = "1"
dyn-clone = "1"
serde_json = "1"