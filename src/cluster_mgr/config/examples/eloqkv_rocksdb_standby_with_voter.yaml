connection:
  username: "${USER}"
  auth_type: "keypair"
  auth:
    keypair: "/home/${USER}/.ssh/id_rsa"
deployment:
  cluster_name: "eloqkv_with_hot_standby_and_voter"
  product: "EloqKV"
  version: "latest"
  install_dir: "/home/${USER}"
  tx_service:
    tx_host_ports: [127.0.0.1:6379]
    standby_host_ports: [127.0.0.1:6389]
    voter_host_ports: [127.0.0.1:6399]
    # requirepass: "asd"

  # log_service:
  #   nodes:
  #     - host: 127.0.0.1
  #       port: 9000
  #       data_dir:
  #         - "/home/${USER}/eloqkv_with_hot_standby_and_voter/wal_eloqkv"
  #   replica: 1
  storage_service:
    rocksdb: !LOCAL
