connection:
  username: "${USER}"
  auth_type: "keypair"
  auth:
    keypair: "/home/${USER}/.ssh/id_rsa"
deployment:
  cluster_name: "eloqkv_with_hot_standby_and_voter"
  product: "EloqKV"
  version: "latest"
  install_dir: "/home/${USER}"
  enable_wal: false
  enable_io_uring: false
  checkpointer_interval: 120
  tx_service:
    tx_host_ports: [192.168.122.24:6379]
    standby_host_ports: [192.168.122.25:6379]
    voter_host_ports: [192.168.122.26:6379]
  # storage_service:
  #   rocksdb: !LOCAL
  #     # path: /tmp
