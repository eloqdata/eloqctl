connection:
  username: "${USER}"
  auth_type: "keypair"
  auth:
    keypair: "/home/${USER}/.ssh/id_rsa"
deployment:
  cluster_name: "eloqkv-cluster-singlenode-monitor"
  product: "EloqKV"
  version: "latest"
  install_dir: "/mnt/ssd/${USER}/zhouxiao"
  enable_wal: false
  tx_service:
    tx_host_ports: [192.168.122.24:6389]
    # enable_cache_replacement: on
    # requirepass: "asd"
    # client_port: 6389
  storage_service:
    rocksdb: !LOCAL
      # path: /tmp
  monitor:
    data_dir: ""
    eloq_metrics:
      path: "/eloq_metrics"
      port: 18081
    prometheus:
      download_url: "https://github.com/prometheus/prometheus/releases/download/v2.42.0/prometheus-2.42.0.linux-amd64.tar.gz"
      port: 9500
      host: 192.168.122.28
    grafana:
      download_url: "https://dl.grafana.com/oss/release/grafana-9.3.6.linux-amd64.tar.gz"
      port: 3301
      host: 192.168.122.28
    node_exporter:
      url: "https://github.com/prometheus/node_exporter/releases/download/v1.5.0/node_exporter-1.5.0.linux-amd64.tar.gz"
      port: 9200
