connection:
  username: "${USER}"
  auth_type: "keypair"
  auth:
    keypair: "/home/${USER}/.ssh/id_rsa"
deployment:
  cluster_name: "eloqkv_with_hot_standby"
  product: "EloqKV"
  version: "latest"
  install_dir: "/home/${USER}"
  enable_wal: true
  enable_io_uring: false
  enable_tls: false
  cluster_mode: true
  checkpointer_interval: 120
  tx_service:
    tx_host_ports: [10.0.0.1:6379]
    standby_host_ports: [10.0.0.2:6379|10.0.0.3:6379]
  log_service:
    nodes:
      - host: 10.0.0.4
        port: 9000
        data_dir:
          - "/home/${USER}/eloqkv_with_hot_standby/wal_eloqkv"
    replica: 1
    bthread_concurrency: 1
  storage_service:
    rocksdb: !LOCAL
      # path: /tmp
  hardware:
    10.0.0.1:
      cpu: 4
      memory: 8192
    10.0.0.2:
      cpu: 4
      memory: 8192
    10.0.0.3:
      cpu: 4
      memory: 8192
    10.0.0.4:
      cpu: 4
      memory: 8192
