connection:
  username: "${USER}"
  auth_type: "keypair"
  auth:
    keypair: "/home/${USER}/.ssh/id_rsa"
deployment:
  cluster_name: "eloqkv_with_hot_standby"
  product: "EloqKV"
  version: "latest"
  install_dir: "/home/${USER}"
  tx_service:
    tx_host_ports: [127.0.0.1:6379]
    standby_host_ports: [127.0.0.1:6389|127.0.0.1:6399]
  storage_service:
    rocksdb: !LOCAL
      # path: /tmp