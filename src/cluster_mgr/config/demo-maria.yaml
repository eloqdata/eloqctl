connection:
  username: "ubuntu"
  auth_type: "keypair"
  auth:
    keypair: "/home/ubuntu/.ssh/ed25519_mono"
deployment:
  product: "Monograph"
  tx_image: "https://dzkle3nb4zzyc.cloudfront.net/main_tagged_range_ubuntu2004/cassandra/0.3.3/monographdb-tx-release-bin.tar.gz"
  log_image: "https://dzkle3nb4zzyc.cloudfront.net/main_tagged_range_ubuntu2004/cassandra/0.3.3/monographdb-log-release-bin.tar.gz"
  cluster_name: "demo-maria"
  install_dir: "/home/ubuntu/POC"
  port:
    mysql_port: 3300
    monograph_port:
      start: 8000
      end: 8009
  log_service:
    nodes:
      - host: 127.0.0.1
        port: 9000
        data_dir:
          - "/home/ubuntu/POC/demo-maria/logDisk1"
          - "/home/ubuntu/POC/demo-maria/logDisk2"
          - "/home/ubuntu/POC/demo-maria/logDisk3"
    replica: 1
  tx_service:
    host:
      - 127.0.0.1
  storage_service:
    cassandra:
      download_url: "https://dlcdn.apache.org/cassandra/4.1.3/apache-cassandra-4.1.3-bin.tar.gz"
      storage_cluster: "mono-cass-cluster"
      host:
        - 127.0.0.1
  monitor:
    data_dir: ""
    monograph_metrics:
      path: "/mono_metrics"
      port: 18081
    prometheus:
      download_url: "https://github.com/prometheus/prometheus/releases/download/v2.42.0/prometheus-2.42.0.linux-amd64.tar.gz"
      port: 9500
      host: "127.0.0.1"
    grafana:
      download_url: "https://dl.grafana.com/oss/release/grafana-9.3.6.linux-amd64.tar.gz"
      port: 3301
      host: "127.0.0.1"
    node_exporter: "https://github.com/prometheus/node_exporter/releases/download/v1.5.0/node_exporter-1.5.0.linux-amd64.tar.gz"
    node_exporter_port: 9200
    mysql_exporter: "https://github.com/prometheus/mysqld_exporter/releases/download/v0.14.0/mysqld_exporter-0.14.0.linux-amd64.tar.gz"
    mysql_exporter_port: 9300
    cassandra_collector:
      mcac_agent: "https://github.com/datastax/metric-collector-for-apache-cassandra/releases/download/v0.3.4/datastax-mcac-agent-0.3.4-4.1-beta1.tar.gz"
      mcac_port: 9103
