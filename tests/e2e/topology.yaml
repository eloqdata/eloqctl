connection:
  username: "eloq"
  auth_type: "keypair"
  auth:
    keypair: "${ELOQCTL_DOCKER_SSH_KEY}"
  ssh_endpoints:
    172.28.10.11:
      host: "127.0.0.1"
      port: 2221
    172.28.10.12:
      host: "127.0.0.1"
      port: 2222
    172.28.10.13:
      host: "127.0.0.1"
      port: 2223
  service_endpoints:
    172.28.10.11:6379:
      host: "127.0.0.1"
      port: 16371
    172.28.10.11:16380:
      host: "127.0.0.1"
      port: 26371
    172.28.10.11:6390:
      host: "127.0.0.1"
      port: 16391
    172.28.10.12:6379:
      host: "127.0.0.1"
      port: 16372
    172.28.10.12:16380:
      host: "127.0.0.1"
      port: 26372
    172.28.10.13:6379:
      host: "127.0.0.1"
      port: 16373
    172.28.10.13:16380:
      host: "127.0.0.1"
      port: 26373
deployment:
  cluster_name: "test-e2e"
  product: "EloqKV"
  version: "1.2.2"
  install_dir: "/home/eloq"
  enable_wal: false
  enable_io_uring: false
  cluster_mode: true
  checkpoint_interval: 120
  hardware:
    172.28.10.11:
      cpu: 2
      memory: 1024
    172.28.10.12:
      cpu: 2
      memory: 1024
    172.28.10.13:
      cpu: 2
      memory: 1024
  tx_service:
    tx_host_ports: [172.28.10.11:6379]
    standby_host_ports: [172.28.10.12:6379]
    voter_host_ports: [172.28.10.13:6379]
    requirepass: "testpass"
  storage_service:
    rocksdb: !LOCAL
      path: "/home/eloq/rocksdb"
