connection:
  username: "${USER}"
  auth_type: "keypair"
  auth:
    keypair: "/home/${USER}/.ssh/id_rsa"
deployment:
  cluster_name: "eloqkv_with_hot_standby_and_voter"
  product: "EloqKV"
  version: "latest"
  install_dir: "/home/${USER}"
  tx_service:
    tx_host_ports: [192.168.122.24:6349,192.168.122.25:6359,192.168.122.26:6369]
    standby_host_ports: [192.168.122.24:7349,192.168.122.25:7359,192.168.122.26:7369]
    # voter_host_ports: [192.168.122.26:6369,192.168.122.26:7369]
  log_service:
    nodes:
      - host: 192.168.122.24
        port: 9400
        data_dir:
          - "/home/${USER}/eloqkv_with_hot_standby_and_voter/wal_eloqkv/9400"
      - host: 192.168.122.24
        port: 9500
        data_dir:
          - "/home/${USER}/eloqkv_with_hot_standby_and_voter/wal_eloqkv/9500"
      - host: 192.168.122.25
        port: 9600
        data_dir:
          - "/home/${USER}/eloqkv_with_hot_standby_and_voter/wal_eloqkv/9600"
    replica: 3
  storage_service:
    rocksdb: !LOCAL
      # path: /tmp

