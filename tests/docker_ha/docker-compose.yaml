services:
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: eloqctl-e2e-minio
    hostname: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"
    networks:
      eloqctl-e2e-net:
        ipv4_address: 172.28.10.20

  eloq-tx:
    build:
      context: .
    image: eloqctl-e2e-ubuntu:24.04
    container_name: eloqctl-e2e-tx
    hostname: eloq-tx
    ports:
      - "127.0.0.1:2221:22"
      - "127.0.0.1:16371:6379"
      - "127.0.0.1:26371:16380"
      - "127.0.0.1:16391:6390"
    networks:
      eloqctl-e2e-net:
        ipv4_address: 172.28.10.11
    depends_on:
      - minio

  eloq-standby:
    image: eloqctl-e2e-ubuntu:24.04
    container_name: eloqctl-e2e-standby
    hostname: eloq-standby
    ports:
      - "127.0.0.1:2222:22"
      - "127.0.0.1:16372:6379"
      - "127.0.0.1:26372:16380"
    depends_on:
      - eloq-tx
      - minio
    networks:
      eloqctl-e2e-net:
        ipv4_address: 172.28.10.12

  eloq-voter:
    image: eloqctl-e2e-ubuntu:24.04
    container_name: eloqctl-e2e-voter
    hostname: eloq-voter
    ports:
      - "127.0.0.1:2223:22"
      - "127.0.0.1:16373:6379"
      - "127.0.0.1:26373:16380"
    depends_on:
      - eloq-tx
      - minio
    networks:
      eloqctl-e2e-net:
        ipv4_address: 172.28.10.13

  eloq-control:
    image: eloqctl-e2e-ubuntu:24.04
    container_name: eloqctl-e2e-control
    hostname: eloq-control
    ports:
      - "127.0.0.1:2224:22"
      - "127.0.0.1:19010:9000"
      - "127.0.0.1:19500:9500"
      - "127.0.0.1:19093:9093"
      - "127.0.0.1:13301:3301"
      - "127.0.0.1:18080:8080"
    working_dir: /workspace/eloq_waiter
    volumes:
      - "../..:/workspace/eloq_waiter"
    depends_on:
      - eloq-tx
      - minio
    networks:
      eloqctl-e2e-net:
        ipv4_address: 172.28.10.14

  stress-python:
    build:
      context: ../..
      dockerfile: tests/docker_ha/Dockerfile.stress
    image: eloqctl-e2e-stress:latest
    container_name: eloqctl-e2e-stress-python
    hostname: stress-python
    working_dir: /workspace/eloq_waiter
    command: ["sleep", "infinity"]
    volumes:
      - "../..:/workspace/eloq_waiter"
    depends_on:
      - eloq-tx
      - eloq-standby
      - eloq-voter
      - eloq-control
    networks:
      eloqctl-e2e-net:
        ipv4_address: 172.28.10.30

  stress-go:
    build:
      context: ../..
      dockerfile: tests/docker_ha/Dockerfile.stress_go
    image: eloqctl-e2e-stress-go:latest
    container_name: eloqctl-e2e-stress-go
    hostname: stress-go
    working_dir: /workspace/eloq_waiter
    command: ["sleep", "infinity"]
    volumes:
      - "../..:/workspace/eloq_waiter"
    depends_on:
      - eloq-tx
      - eloq-standby
      - eloq-voter
      - eloq-control
    networks:
      eloqctl-e2e-net:
        ipv4_address: 172.28.10.31

  stress-ts:
    build:
      context: ../..
      dockerfile: tests/docker_ha/Dockerfile.stress_ts
    image: eloqctl-e2e-stress-ts:latest
    container_name: eloqctl-e2e-stress-ts
    hostname: stress-ts
    working_dir: /workspace/eloq_waiter
    command: ["sleep", "infinity"]
    volumes:
      - "../..:/workspace/eloq_waiter"
    depends_on:
      - eloq-tx
      - eloq-standby
      - eloq-voter
      - eloq-control
    networks:
      eloqctl-e2e-net:
        ipv4_address: 172.28.10.32

networks:
  eloqctl-e2e-net:
    name: eloqctl-e2e-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.10.0/24
