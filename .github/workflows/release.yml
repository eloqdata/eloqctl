name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish"
        required: true
        type: string
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            os_id: ubuntu22
            arch: amd64
          - runner: ubuntu-24.04
            os_id: ubuntu24
            arch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler pkg-config libssl-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2

      - name: Build release tarball
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          TARGET_OS_ID: ${{ matrix.os_id }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          chmod +x scripts/build-release-tarball.sh
          scripts/build-release-tarball.sh

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os_id }}-${{ matrix.arch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*.tar.gz
          overwrite_files: true
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft == 'true' }}
          generate_release_notes: true
