name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish"
        required: true
        type: string
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ubuntu24
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: protobuf-compiler pkg-config libssl-dev
          version: release-ubuntu24-v1

      - name: Ensure build dependencies are available
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler pkg-config libssl-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-21

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2
        with:
          shared-key: release-ubuntu24

      - name: Build release tarball
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          TARGET_OS_ID: ubuntu24
          TARGET_ARCH: amd64
        run: |
          chmod +x scripts/build-release-tarball.sh
          scripts/build-release-tarball.sh

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ubuntu24-amd64
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*.tar.gz
          overwrite_files: true
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft == 'true' }}
          generate_release_notes: true
